apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-api
  namespace: leaderboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leaderboard-api
  template:
    metadata:
      labels:
        app: leaderboard-api
    spec:
      containers:
        - name: api
          image: leaderboard-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: leaderboard-config
            - secretRef:
                name: leaderboard-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-api-service
  namespace: leaderboard
spec:
  type: LoadBalancer
  selector:
    app: leaderboard-api
  ports:
    - port: 80
      targetPort: 3000
