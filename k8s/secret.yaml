apiVersion: v1
kind: Secret
metadata:
  name: leaderboard-secret
  namespace: leaderboard
type: Opaque
# Base64-encoded values. In production, use sealed-secrets or external secrets manager.
# echo -n 'leaderboard' | base64 → bGVhZGVyYm9hcmQ=
# echo -n 'leaderboard_secret' | base64 → bGVhZGVyYm9hcmRfc2VjcmV0
data:
  DB_USERNAME: bGVhZGVyYm9hcmQ=
  DB_PASSWORD: bGVhZGVyYm9hcmRfc2VjcmV0
