apiVersion: v1
kind: ConfigMap
metadata:
  name: leaderboard-config
  namespace: leaderboard
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "leaderboard"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  LEADERBOARD_ZSET_KEY: "leaderboard:zset"
  DEFAULT_TOP_LIMIT: "100"
  MAX_TOP_LIMIT: "1000"
  TOP_CACHE_TTL_SECONDS: "10"
  LEADERBOARD_NEIGHBOR_COUNT: "5"
